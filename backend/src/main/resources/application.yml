spring:
  application:
    name: visual-spider

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: VisualSpiderScheduler
            instanceId: AUTO
          threadPool:
            threadCount: 5

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.visualspider.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

snapshot:
  storage-path: ./snapshots

logging:
  level:
    com.visualspider: DEBUG
    org.springframework.web: INFO
    org.mybatis: DEBUG
